name: CI-CD Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ventas-service:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push Ventas
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ventas-service:latest

      - name: Build Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despachos-service:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push Despachos
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despachos-service:latest

      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest ./front_despacho

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest
